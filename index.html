function zoneRect(floorIndex,z){ const [id,label,rx,ry,w,h]=z; const baseX=92, baseY=104 + floorIndex*86; const x=baseX+rx, y=baseY+ry; return `<g class="map-hotspot" data-tab="${esc(id)}"><rect class="zone" x="${x}" y="${y}" width="${w}" height="${h}" rx="11" fill="${zoneColor(id)}" opacity=".72" transform="skewY(16)"/><text class="zone-text" x="${x+13}" y="${y+26}" transform="skewY(16)">${esc(label)}</text></g>`; }
function renderMap(){ const floors=[...FLOORS]; const svgFloors=floors.map((f,i)=>{ const x=70, y=106+i*86; const side=`<polygon class="floor-side" points="${x+410},${y+128} ${x+690},${y+38} ${x+690},${y+63} ${x+410},${y+153}"/><polygon class="floor-side" points="${x},${y} ${x+410},${y+128} ${x+410},${y+153} ${x},${y+25}"/>`; const zones=(f.zones||[]).map(z=>zoneRect(i,z)).join(''); const callY=y+50; const call=`<line class="callout" x1="${x+710}" y1="${callY}" x2="880" y2="${callY-18}"/><text class="floor-label" x="900" y="${callY-22}">${esc(f.floor)}</text><text class="floor-sub" x="900" y="${callY-5}">${esc(f.subtitle)}</text>`; return `<g>${side}<polygon class="floor-base" points="${floorPolygon(x,y)}"/>${zones}<text class="floor-label" x="${x-30}" y="${y+28}">${esc(f.floor)}</text><text class="floor-sub" x="${x-30}" y="${y+45}">${esc(f.subtitle)}</text>${call}</g>`; }).join(''); const svg=`<svg id="mapSvg" class="iso-map" viewBox="0 0 1040 760" role="img" aria-label="深圳国际美术馆七展2.5D楼层示意图"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity=".35"/></filter></defs><rect width="1040" height="760" fill="transparent"/><g filter="url(#shadow)">${svgFloors}</g><path class="shaft" d="M560 75 L560 655"/><path class="shaft" d="M415 135 L415 655" opacity=".55"/>${[0,1,2,3,4,5].map((i)=>`<circle class="route-dot" cx="560" cy="${146+i*86}" r="8"/>`).join('')}<text x="385" y="704" fill="#b9afa1" font-size="12">虚线为电梯/跨层漫游示意；彩色区域可点击跳转展览卡片。</text></svg>`; const routeBtns=ROUTES.map((r,i)=>`<button data-route-select="${esc(r.id)}" class="${i===0?'active':''}">${esc(r.title)} · ${esc(r.time)}</button>`).join(''); const routes=ROUTES.map((r,i)=>`<article class="route-card" id="route-${esc(r.id)}"><h3>${esc(r.title)}<span class="time">${esc(r.time)}</span></h3><ol>${r.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol></article>`).join(''); const sourceLinks=SOURCES.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.label)}</a>`).join(''); $('#mapWrap').innerHTML=`<div class="map-panel"><div class="map-head"><h2>七展 2.5D 游览地图</h2><p>参照馆内展厅信息做的动线示意：点击彩色展区可切换到对应展览卡片页。</p></div>${svg}<div class="legend">${routeBtns}</div></div><div id="routeList" class="route-cards">${routes}</div><div class="source-grid">${sourceLinks}</div>`; }
function routeSelect(id){ setView('map'); setTimeout(()=>{ document.querySelectorAll('.legend button').forEach(b=>b.classList.toggle('active',b.dataset.routeSelect===id)); const el=$(`#route-${CSS.escape(id)}`); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },120); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2300); }
document.addEventListener('click', e=>{ const tab=e.target.closest('[data-tab]'); if(tab){ const id=tab.dataset.tab; if(id) setView(id); return; } const route=e.target.closest('[data-route-select]'); if(route){ routeSelect(route.dataset.routeSelect); return; } const card=e.target.closest('.card[data-id]'); if(card){ openCard(card.dataset.id); return; } if(e.target.closest('[data-close]')) closeModal(); if(e.target.id==='infoBtn') toast('七展卡片墙 + 弹窗详情 + 2.5D游览地图。下载ZIP后请保留assets文件夹。'); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
$('#modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
$('#search').addEventListener('input', renderCards);
renderTabs(); hero(); renderCards();
</script>
</body>

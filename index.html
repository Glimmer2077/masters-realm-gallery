<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0d0b" />
  <title>大师之境｜手机博物馆导览</title>
  <style>
    :root {
      --bg: #0e0d0b;
      --bg2: #14120f;
      --card: #1b1814;
      --card2: #211d18;
      --line: rgba(243,237,226,.12);
      --text: #f3ede2;
      --muted: #b8aea0;
      --soft: #8e8476;
      --gold: #c7a15a;
      --red: #7b2f2f;
      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --radius: 22px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% -10%, rgba(199,161,90,.16), transparent 34rem),
        radial-gradient(circle at 90% 0%, rgba(123,47,47,.15), transparent 22rem),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.45;
    }
    a { color: var(--gold); text-decoration: none; }
    .app { min-height: 100vh; padding-bottom: calc(38px + var(--safe-bottom)); }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: calc(10px + var(--safe-top)) 16px 10px;
      background: linear-gradient(180deg, rgba(14,13,11,.96), rgba(14,13,11,.82));
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .top-row { display: flex; align-items: center; gap: 10px; }
    .brand { min-width: 0; flex: 1; }
    .brand .label { color: var(--gold); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .brand h1 {
      margin: 2px 0 0;
      font-size: 18px;
      font-weight: 740;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-btn {
      min-width: 40px; height: 40px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      display: grid; place-items: center;
      font-size: 18px;
    }
    .exhibition-tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 12px 0 4px;
      scrollbar-width: none;
    }
    .exhibition-tabs::-webkit-scrollbar { display: none; }
    .chip {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.045);
      color: var(--muted);
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }
    .chip.active { color: #19130a; background: var(--gold); border-color: rgba(199,161,90,.7); font-weight: 700; }
    .searchbar { position: sticky; top: calc(70px + var(--safe-top)); z-index: 20; padding: 10px 16px 0; background: linear-gradient(180deg, rgba(14,13,11,.94), rgba(14,13,11,0)); }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
    }
    .search::placeholder { color: rgba(184,174,160,.75); }
    .hero { padding: 12px 10px 4px; }
    .hero-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.025));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .hero-card:before {
      content: "";
      position: absolute; inset: -40px -70px auto auto;
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle, rgba(199,161,90,.26), transparent 62%);
    }
    .hero h2 { margin: 0; font-size: 17px; line-height: 1.2; letter-spacing: -.02em; }
    .hero p { margin: 6px 0 0; color: var(--muted); font-size: 12px; line-height:1.35; }
    .quick { display: flex; gap: 6px; margin-top: 10px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
    .quick::-webkit-scrollbar { display:none; }
    .quick a {
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      background: rgba(0,0,0,.18);
      font-size: 11px;
      white-space:nowrap;
    }
    main { padding: 0 10px; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 8px;
      padding: 18px 0 8px;
    }
    .section-head h3 { margin: 0; font-size: 17px; letter-spacing: -.02em; }
    .section-head span { color: var(--soft); font-size: 11px; white-space: nowrap; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .grid.rest { gap: 8px; }
    .card {
      position: relative;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      padding: 0;
      color: inherit;
      text-align: left;
      min-height: 0;
      box-shadow: 0 6px 18px rgba(0,0,0,.24);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card.rest-card { min-height: 0; border-radius: 14px; }
    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1.18;
      background: #181512;
      overflow: hidden;
      position: relative;
    }
    .rest-card .thumb { aspect-ratio: 1 / 1.18; }
    .thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: saturate(.98) contrast(1.02);
    }
    .placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      padding: 6px;
      background:
        linear-gradient(135deg, rgba(199,161,90,.22), rgba(123,47,47,.12) 45%, rgba(255,255,255,.045)),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 38%),
        #171410;
      text-align: center;
    }
    .placeholder .mono { color: rgba(243,237,226,.64); font-size: 8px; letter-spacing: .08em; text-transform: uppercase; }
    .placeholder .big { color: var(--text); font-size: 10px; font-weight: 760; line-height: 1.15; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .placeholder .small { color: var(--muted); font-size: 9px; line-height:1.15; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .badge {
      position: absolute; top: 5px; left: 5px;
      z-index: 2;
      border-radius: 999px;
      padding: 3px 5px;
      background: rgba(14,13,11,.72);
      color: var(--gold);
      font-size: 9px;
      border: 1px solid rgba(199,161,90,.35);
      backdrop-filter: blur(8px);
    }

    .source-pill { display:none; }
    .source-pill.exact { color: #17130f; background: rgba(199,161,90,.92); border-color: rgba(199,161,90,.95); }
    .source-pill.verify { background: rgba(123,47,47,.74); }
    .source-pill.preview { background: rgba(255,255,255,.12); }
    .source-pill.pending { background: rgba(123,47,47,.62); }
    .info { padding: 6px 6px 7px; }
    .info h4 { margin: 0; font-size: 11px; line-height: 1.18; letter-spacing: -.01em; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:26px; }
    .info p { margin: 3px 0 0; color: var(--muted); font-size: 9.5px; line-height: 1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tags { display: none; }
    .tag { color: var(--gold); background: rgba(199,161,90,.1); border: 1px solid rgba(199,161,90,.16); border-radius: 999px; padding: 4px 6px; font-size: 10.5px; }
    .empty { display: none; color: var(--muted); padding: 26px 4px; text-align: center; }
    .modal { position: fixed; inset: 0; z-index: 80; display: none; }
    .modal.open { display: block; }
    .scrim { position: absolute; inset: 0; background: rgba(0,0,0,.68); backdrop-filter: blur(10px); }
    .sheet {
      position: absolute;
      inset: auto 0 0 0;
      max-height: min(92vh, 840px);
      background: linear-gradient(180deg, #191611, #0f0e0c);
      border-top: 1px solid var(--line);
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -20px 70px rgba(0,0,0,.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: rise .22s ease-out;
    }
    @keyframes rise { from { transform: translateY(16px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
    .close {
      position: absolute; right: 14px; top: 14px; z-index: 3;
      width: 40px; height: 40px; border: 1px solid var(--line); border-radius: 999px;
      background: rgba(0,0,0,.5); color: var(--text); font-size: 24px;
    }
    .modal-media { width: 100%; max-height: 46vh; background: #111; overflow: hidden; }
    .modal-media img { width: 100%; height: 100%; max-height: 46vh; object-fit: contain; display: block; background: #111; }
    .modal-media .placeholder { min-height: 280px; }
    .modal-body { padding: 18px 18px calc(24px + var(--safe-bottom)); overflow-y: auto; }
    .modal-section { border-top: 1px solid var(--line); margin-top: 16px; padding-top: 14px; }
    .eyebrow { color: var(--gold); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .modal h2 { margin: 6px 0 4px; font-size: 24px; line-height: 1.18; letter-spacing: -.02em; }
    .modal .en { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px; }
    .meta span { border: 1px solid var(--line); border-radius: 999px; padding: 5px 8px; color: var(--muted); font-size: 12px; }
    .lead { color: var(--text); font-size: 16px; margin: 0; }
    .tips { margin: 10px 0 0; padding-left: 18px; color: var(--muted); }
    .tips li { margin: 7px 0; }
    .keyword-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .source-note { color: var(--soft); font-size: 12px; margin-top: 10px; }
    .toast { position: fixed; left: 50%; bottom: calc(24px + var(--safe-bottom)); transform: translateX(-50%); background: rgba(30,27,22,.92); color: var(--text); border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; font-size: 13px; }
    .toast.show { opacity: 1; }
    @media (min-width: 640px) {
      .app { max-width: 620px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
      .sheet { left: 50%; transform: translateX(-50%); width: min(620px, 100vw); border-radius: 28px 28px 0 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-row">
      <div class="brand">
        <div class="label">Exhibition Guide</div>
        <h1 id="navTitle">大师之境</h1>
      </div>
      <button class="nav-btn" id="infoBtn" aria-label="说明">i</button>
    </div>
    <div class="exhibition-tabs" aria-label="展览导航">
      <button class="chip active" data-ex="masters">大师之境</button>
      <button class="chip" data-ex="placeholder">开馆展 02</button>
      <button class="chip" data-ex="placeholder">开馆展 03</button>
      <button class="chip" data-ex="placeholder">开馆展 04</button>
      <button class="chip" data-ex="placeholder">开馆展 05</button>
      <button class="chip" data-ex="placeholder">开馆展 06</button>
      <button class="chip" data-ex="placeholder">开馆展 07</button>
    </div>
  </header>

  <div class="searchbar">
    <input id="search" class="search" type="search" placeholder="搜作品、画家、关键词：莫奈 / 莎乐美 / 静物" />
  </div>

  <section class="hero">
    <div class="hero-card">
      <h2>像逛手机博物馆一样，看这 71 件作品</h2>
      <p>先看 12 件重点作品，再浏览其余清单。点开图片卡片，会弹出“为什么看、怎么看、和谁对照”的现场提示。图片为个人观展预览用，详情里已标注来源。</p>
      <div class="quick">
        <a href="#focus">12件重点</a>
        <a href="#rest">其余作品</a>
        <a href="#glossary">术语速查</a>
      </div>
    </div>
  </section>

  <main>
    <section id="focus">
      <div class="section-head"><h3>12件重点作品</h3><span id="focusCount"></span></div>
      <div class="grid" id="focusGrid"></div>
    </section>

    <section id="rest">
      <div class="section-head"><h3>其余作品</h3><span id="restCount"></span></div>
      <div class="grid rest" id="restGrid"></div>
      <div id="empty" class="empty">没有匹配的作品，换个关键词试试。</div>
    </section>

    <section id="glossary">
      <div class="section-head"><h3>术语速查</h3><span>现场够用版</span></div>
      <div class="grid rest" id="glossaryGrid"></div>
    </section>
  </main>
</div>

<div class="modal" id="modal" aria-hidden="true">
  <div class="scrim" data-close></div>
  <article class="sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="close" data-close aria-label="关闭">×</button>
    <div class="modal-media" id="modalMedia"></div>
    <div class="modal-body">
      <div class="eyebrow" id="modalSection"></div>
      <h2 id="modalTitle"></h2>
      <div class="en" id="modalEn"></div>
      <div class="meta" id="modalMeta"></div>
      <p class="lead" id="modalSummary"></p>
      <div class="modal-section">
        <div class="eyebrow">站在画前怎么看</div>
        <ol class="tips" id="modalTips"></ol>
      </div>
      <div class="modal-section">
        <div class="eyebrow">关键词</div>
        <div class="keyword-row" id="modalKeywords"></div>
      </div>
      <div class="modal-section">
        <div class="eyebrow">对照观看</div>
        <p class="lead" id="modalCompare"></p>
      </div>
      <div class="source-note" id="modalSource"></div>
    </div>
  </article>
</div>
<div class="toast" id="toast">这个展览位先留着，后续可添加内容。</div>

  ["colorito", "威尼斯画派重视色彩、色层和整体光感的绘画方式。看提香。"],
  ["sacra conversazione", "圣母子与圣徒处在同一空间中的宗教图像类型。看提香。"],
  ["chiaroscuro", "强明暗对比，用光和暗制造戏剧性。看真蒂莱斯基。"],
  ["bodegón", "西班牙静物传统，常有暗背景、少量物体和凝视感。看苏巴朗。"],
  ["plein air", "户外写生，强调直接观察自然光。看莫奈与西涅伊。"],
  ["broken brushwork", "碎笔触，用松散笔触表现光、空气与视觉震动。看莫奈。"],
  ["genre painting", "风俗画，表现日常生活，常带幽默、道德寓意或社会观察。看扬·斯滕。"],
  ["attributed to", "“传为/归于”不是确定亲笔。现场看古典大师展签时尤其重要。"]
];

const $ = (sel) => document.querySelector(sel);
const focusGrid = $('#focusGrid');
const restGrid = $('#restGrid');
const empty = $('#empty');
const search = $('#search');

function commons(file, width = 900) {
  return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}?width=${width}`;
}
function autoPreview(url) {
  return `https://api.microlink.io/?url=${encodeURIComponent(url)}&embed=image.url`;
}
function canAutoPreview(url='') {
  return /mfab\.hu|mng\.hu|commons\.wikimedia\.org|artsandculture\.google\.com|wga\.hu|wikiart\.org|vaszarygaleria\.hu/i.test(String(url));
}
function imageSources(a, width=900) {
  const sources = [];
  const push = (v) => { if (v && !sources.includes(v)) sources.push(v); };
  push(a.imageData);
  push(a.localImage);
  push(a.imageUrl);
  if (a.imageFile) push(commons(a.imageFile, width));
  if (a.sourceUrl && /\.(jpg|jpeg|png|webp)(\?|$)/i.test(a.sourceUrl)) push(a.sourceUrl);
  if (a.sourceUrl && canAutoPreview(a.sourceUrl)) push(autoPreview(a.sourceUrl));
  return sources;
}
window.nextArtworkImage = function(img) {
  let sources = [];
  try { sources = JSON.parse(img.dataset.sources || '[]'); } catch(e) { sources = []; }
  while (sources.length) {
    const next = sources.shift();
    if (next && next !== img.src) {
      img.dataset.sources = JSON.stringify(sources);
      img.src = next;
      return;
    }
  }
  img.outerHTML = img.dataset.fallback || '';
};
function mediaSrc(a, width=900) {
  return imageSources(a,width)[0] || '';
}
function statusClass(a) {
  const s = String(a.imageStatus || '');
  if (s.includes('本地作品图')) return 'source-pill exact';
  if (s.includes('馆藏作品图')) return 'source-pill exact';
  if (s.includes('题名待现场复核') || s.includes('待现场展签复核')) return 'source-pill verify';
  if (s.includes('预览图')) return 'source-pill preview';
  return 'source-pill pending';
}
function statusLabel(a) {
  const s = String(a.imageStatus || '');
  if (s.includes('本地作品图')) return '本地图';
  if (s.includes('Wikimedia')) return '远程图';
  if (s.includes('来源页预览')) return '联网图';
  if (s.includes('题名待现场复核') || s.includes('待现场展签复核')) return '待核图';
  if (s.includes('预览图')) return '预览图';
  return '待补图';
}
function esc(str='') {
  return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
}
function placeholderHTML(a) {
  const label = a.sourceUrl ? '图片预览加载失败' : '待补图';
  const hint = a.sourceUrl ? '可在详情里打开来源页' : '暂未接入图片来源';
  return `<div class="placeholder"><div class="mono">${label}</div><div class="big">${esc(a.artistZh)}</div><div class="small">${esc(a.titleZh)}</div><div class="small">${esc(hint)}</div></div>`;
}
function mediaHTML(a, width=900) {
  const sources = imageSources(a, width);
  if (sources.length) {
    const rest = JSON.stringify(sources.slice(1));
    return `<img src="${esc(sources[0])}" alt="${esc(a.titleZh)}" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="nextArtworkImage(this)" data-sources="${esc(rest)}" data-fallback="${esc(placeholderHTML(a))}">`;
  }
  return placeholderHTML(a);
}
function cardHTML(a) {
  const cls = a.focus ? 'card' : 'card rest-card';
  const badge = `<span class="badge">${String(a.focus ? a.focusOrder : a.order).padStart(2,'0')}</span>`;
  return `<button class="${cls}" data-id="${a.id}">
    <div class="thumb">${badge}<span class="${statusClass(a)}">${esc(statusLabel(a))}</span>${mediaHTML(a, 520)}</div>
    <div class="info"><h4>${esc(a.titleZh)}</h4><p>${esc(a.artistZh)}</p></div>
  </button>`;
}
function matches(a, q) {
  if (!q) return true;
  const hay = [a.titleZh, a.titleEn, a.artistZh, a.artistEn, a.section, a.date, ...(a.tags||[]), ...(a.keywords||[])].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase().trim());
}
function render() {
  const q = search.value.trim();
  const filtered = ARTWORKS.filter(a => matches(a, q));
  const focus = filtered.filter(a => a.focus).sort((a,b)=>a.focusOrder-b.focusOrder);
  const rest = filtered.filter(a => !a.focus).sort((a,b)=>a.order-b.order);
  focusGrid.innerHTML = focus.map(cardHTML).join('');
  restGrid.innerHTML = rest.map(cardHTML).join('');
  $('#focusCount').textContent = `${focus.length} / 12`;
  $('#restCount').textContent = `${rest.length} / 59`;
  empty.style.display = filtered.length ? 'none' : 'block';
}
function renderGlossary() {
  $('#glossaryGrid').innerHTML = glossary.map(([term, desc]) => `
    <button class="card rest-card" style="min-height:150px; cursor:default;">
      <div class="info" style="padding:16px;"><h4 style="color:var(--gold)">${esc(term)}</h4><p style="font-size:13px; line-height:1.45">${esc(desc)}</p></div>
    </button>`).join('');
}
function openArtwork(id) {
  const a = ARTWORKS.find(x => x.id === id);
  if (!a) return;
  $('#modalMedia').innerHTML = mediaHTML(a, 1200);
  $('#modalSection').textContent = a.section;
  $('#modalTitle').textContent = a.titleZh;
  $('#modalEn').textContent = a.titleEn;
  $('#modalMeta').innerHTML = [a.artistZh + ' / ' + a.artistEn, a.date, a.medium].filter(Boolean).map(x => `<span>${esc(x)}</span>`).join('');
  $('#modalSummary').textContent = a.summary || '';
  $('#modalTips').innerHTML = (a.viewTips || []).map(t => `<li>${esc(t)}</li>`).join('');
  $('#modalKeywords').innerHTML = (a.keywords || a.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  $('#modalCompare').textContent = a.compare || '';
  const source = a.sourceUrl ? `<a href="${esc(a.sourceUrl)}" target="_blank" rel="noreferrer">${esc(a.sourceLabel || '资料来源')}</a>` : esc(a.sourceLabel || '来源待补');
  const museum = a.museumPage ? `<br><span>馆方作品页：<a href="${esc(a.museumPage)}" target="_blank" rel="noreferrer">打开</a></span>` : '';
  const local = a.localImage ? `<br><span>本地图片：${esc(a.localImage)}</span>` : '';
  $('#modalSource').innerHTML = `资料/图片：${source}<br><span>${esc(a.imageStatus || (a.imageFile ? '馆藏作品图' : '来源页预览图'))}</span>${local}${museum}`;
  $('#modal').classList.add('open');
  $('#modal').setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  $('#modal').classList.remove('open');
  $('#modal').setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

document.addEventListener('click', e => {
  const card = e.target.closest('.card[data-id]');
  if (card) openArtwork(card.dataset.id);
  if (e.target.matches('[data-close]')) closeModal();
  const chip = e.target.closest('.chip');
  if (chip && chip.dataset.ex === 'placeholder') toast('这个展览位先留着，后续可添加内容。');
  if (e.target.id === 'infoBtn') toast('第一版：数据驱动作品墙 + 弹窗详情 + 深色手机界面。');
});
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
search.addEventListener('input', render);

render();
renderGlossary();
</script>
</body>
</html>
